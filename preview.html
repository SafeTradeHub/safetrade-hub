<!DOCTYPE html>
<html>
<head>
  <title>SafeTrade Hub Pro</title>
  <style>
    body { font-family: Arial; text-align: center; background: #0f172a; color: white; }
    h1 { color: #22c55e; }
    .box { background: #1e293b; padding: 20px; margin: 20px; border-radius: 10px; }
    input, select, button, textarea { padding: 10px; margin: 5px; width: 80%; }
    button { background: #22c55e; color: white; border: none; cursor: pointer; }
    table { width: 90%; margin: auto; border-collapse: collapse; color: white; }
    th, td { border: 1px solid #22c55e; padding: 8px; }
  </style>
</head>
<body>

<h1>SafeTrade Hub Pro</h1>
<p>Signup/Login + P2P + Flash Buy 🇵🇰</p>

<div class="box">
  <h2>Signup / Login</h2>
  <input type="text" id="name" placeholder="Full Name"><br>
  <input type="text" id="phone" placeholder="Phone"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="file" id="kyc" placeholder="Upload ID"><br>
  <button onclick="signup()">Signup / Login</button>
</div>

<div class="box">
  <h2>Place P2P Order</h2>
  <select id="type"><option>Buy</option><option>Sell</option></select><br>
  <select id="coin"><option>USDT</option><option>BTC</option><option>ETH</option><option>XRP</option><option>BNB</option><option>TRX</option></select><br>
  <input type="number" id="amount" placeholder="Amount"><br>
  <select id="pair"><option>PKR</option><option>USDT</option></select><br>
  <button onclick="placeOrder()">Place Order</button>
</div>

<div class="box">
  <h2>USDT Flash Buy - 40 PKR / USDT</h2>
  <input type="number" id="flashAmount" placeholder="Amount USDT"><br>
  <button onclick="flashBuy()">Flash Buy</button>
</div>

<div class="box">
  <h2>Customer Help / Support</h2>
  <input type="text" id="helpName" placeholder="Your Name"><br>
  <input type="text" id="helpPhone" placeholder="Phone / WhatsApp"><br>
  <textarea id="helpMsg" placeholder="Your Message"></textarea><br>
  <button onclick="sendHelp()">Send Help Request</button>
</div>

<div class="box">
  <h2>Admin Panel</h2>
  <table>
    <thead>
      <tr>
        <th>Timestamp</th><th>Name</th><th>Phone</th><th>Type</th>
        <th>Coin</th><th>Amount</th><th>Pair</th><th>Price</th>
        <th>Status</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="adminTable"></tbody>
  </table>
</div>

<script>
const MARGIN = 0.04;
const PKR_RATE = 280;
const FLASH_RATE = 40;
const WA_NUMBER = "923446692639"; 
const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEBAPP_URL"; 

let orders = [];
let prices = {};

async function signup() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  if(!name || !phone){ alert("Fill Name & Phone"); return; }
  alert("Signed in as " + name);
}

async function getPrices() {
  let res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,tether,ripple,binancecoin,tron&vs_currencies=usd");
  let data = await res.json();
  prices = {
    BTC: data.bitcoin.usd*(1+MARGIN),
    ETH: data.ethereum.usd*(1+MARGIN),
    USDT: data.tether.usd*(1+MARGIN),
    XRP: data.ripple.usd*(1+MARGIN),
    BNB: data.binancecoin.usd*(1+MARGIN),
    TRX: data.tron.usd*(1+MARGIN)
  };
}

async function saveToSheet(payload, sheet){
  await fetch(SCRIPT_URL, {
    method:"POST",
    body: JSON.stringify({sheet:sheet,data:payload}),
    headers:{ "Content-Type":"application/json" }
  });
}

async function placeOrder() {
  let type = document.getElementById("type").value;
  let coin = document.getElementById("coin").value;
  let amount = parseFloat(document.getElementById("amount").value);
  let pair = document.getElementById("pair").value;
  if(!amount){ alert("Enter amount"); return; }

  let finalPrice = (amount * ((pair==="PKR")?prices[coin]*PKR_RATE : prices[coin])).toFixed(2);
  let timestamp = new Date().toLocaleString();
  let order = {timestamp, name: document.getElementById("name").value, phone: document.getElementById("phone").value, type, coin, amount, pair, finalPrice, status:"Pending"};
  orders.push(order);
  updateAdmin();
  saveToSheet(order,"Orders");

  let msg = `New P2P Order!\nName: ${order.name}\nPhone: ${order.phone}\nType: ${type}\nCoin: ${coin}\nAmount: ${amount}\nPair: ${pair}\nPrice: ${finalPrice}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
}

async function flashBuy(){
  let amount = parseFloat(document.getElementById("flashAmount").value);
  if(!amount){ alert("Enter amount"); return; }
  let totalPrice = (amount * FLASH_RATE).toFixed(2);
  let timestamp = new Date().toLocaleString();
  let order = {timestamp, name: document.getElementById("name").value, phone: document.getElementById("phone").value, type:"Flash Buy", coin:"USDT", amount, pair:"PKR", finalPrice: totalPrice, status:"Completed"};
  orders.push(order);
  updateAdmin();
  saveToSheet(order,"Orders");
  alert(`Flash Buy Success! Total: ${totalPrice} PKR`);

  let msg = `Flash Buy Order!\nName: ${order.name}\nPhone: ${order.phone}\nAmount USDT: ${amount}\nTotal PKR: ${totalPrice}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
}

async function sendHelp(){
  let hName = document.getElementById("helpName").value;
  let hPhone = document.getElementById("helpPhone").value;
  let hMsg = document.getElementById("helpMsg").value;
  if(!hName || !hPhone || !hMsg){ alert("Fill all fields"); return; }
  alert("Help request sent ✅");
  let payload = {timestamp:new Date().toLocaleString(), name:hName, phone:hPhone, message:hMsg};
  saveToSheet(payload,"HelpRequests");
  let msg=`Help Request!\nName: ${hName}\nPhone: ${hPhone}\nMessage: ${hMsg}`;
  window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
}

function updateAdmin(){
  let table = document.getElementById("adminTable");
  table.innerHTML="";
  orders.forEach((o,i)=>{
    table.innerHTML+=`<tr>
      <td>${o.timestamp}</td><td>${o.name}</td><td>${o.phone}</td><td>${o.type}</td><td>${o.coin}</td><td>${o.amount}</td><td>${o.pair}</td><td>${o.finalPrice}</td><td>${o.status}</td>
      <td>${o.status==="Pending"?`<button onclick="approve(${i})">✅</button> <button onclick="reject(${i})">❌</button>`:""}</td>
    </tr>`;
  });
}

function approve(i){ orders[i].status="Approved"; updateAdmin(); }
function reject(i){ orders[i].status="Rejected"; updateAdmin(); }

getPrices();
setInterval(getPrices,10000);
</script>

</body>
</html>
